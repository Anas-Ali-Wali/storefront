<section class="py-24 px-12 max-w-[1920px] mx-auto bg-white">

  <!-- Heading -->
  <div class="flex items-end justify-between mb-16">
    <div>
      <h2 class="text-4xl font-bold text-slate-900 mb-2">
        Curated Categories
      </h2>
      <p class="text-slate-500">
        Defining your space through intentional design.
      </p>
    </div>
  </div>

  <!-- GRID -->
  <div class="grid grid-cols-1 md:grid-cols-4 md:auto-rows-[220px] gap-6">

    <!-- BIG LEFT CARD -->
    <a *ngIf="categories[0]"
       [routerLink]="['/shop']"
       [queryParams]="{ categoryId: categories[0].categoryId }"
       class="md:col-span-2 md:row-span-2 relative group rounded-xl overflow-hidden">

      <img
        [src]="getImageUrl(categories[0].imageUrl)"
        class="w-full h-full object-cover group-hover:scale-105 transition duration-700"
      />

      <div class="absolute inset-0 bg-black/50 group-hover:bg-black/60 transition"></div>

      <div class="absolute bottom-8 left-8 text-white">
        <h3 class="text-3xl font-bold text-white">
          {{ categories[0].name }}
        </h3>
        <span class="text-sm underline">Shop Now</span>
      </div>
    </a>

    <!-- TOP RIGHT -->
    <a *ngIf="categories[1]"
       [routerLink]="['/shop']"
       [queryParams]="{ categoryId: categories[1].categoryId }"
       class="md:col-span-2 relative group rounded-xl overflow-hidden">

      <img
        [src]="getImageUrl(categories[1].imageUrl)"
        class="w-full h-full object-cover group-hover:scale-105 transition duration-700"
      />

      <div class="absolute inset-0 bg-black/50 group-hover:bg-black/60 transition"></div>

      <div class="absolute bottom-6 left-6 text-white">
        <h3 class="text-2xl font-bold text-white">
          {{ categories[1].name }}
        </h3>
        <span class="text-sm underline">Shop Now</span>
      </div>
    </a>

    <!-- SMALL CARDS -->
    <a *ngFor="let cat of categories.slice(2)"
       [routerLink]="['/shop']"
       [queryParams]="{ categoryId: cat.categoryId }"
       class="relative group rounded-xl overflow-hidden">

      <img
        [src]="getImageUrl(cat.imageUrl)"
        class="w-full h-full object-cover group-hover:scale-105 transition duration-700"
      />

      <div class="absolute inset-0 bg-black/50 group-hover:bg-black/60 transition"></div>

      <div class="absolute bottom-4 left-4 text-white">
        <h3 class="text-lg font-bold text-white">
          {{ cat.name }}
        </h3>
        <span class="text-xs underline">Shop Now</span>
      </div>

    </a>

  </div>

</section>
