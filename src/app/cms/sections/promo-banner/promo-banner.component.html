<section class="py-12 px-4 sm:px-6 lg:px-12">
  <div class="relative overflow-hidden rounded-3xl p-10 sm:p-14 lg:p-16 shadow-xl border"
       style="background-color: var(--promo-bg); border-color: rgba(255,255,255,0.1);">

    <!-- Background glow -->
    <div class="absolute inset-0 opacity-20 pointer-events-none">
      <div class="absolute -right-20 -top-20 h-[400px] w-[400px] rounded-full blur-3xl"
           style="background-color: var(--primary-color);"></div>
      <div class="absolute -bottom-20 -left-20 h-[400px] w-[400px] rounded-full blur-3xl"
           style="background-color: var(--accent-color);"></div>
    </div>

    <div class="relative z-10 grid gap-10 lg:grid-cols-2 lg:items-center">

      <!-- LEFT -->
      <div class="text-center lg:text-left">
        <p class="text-xs font-bold uppercase tracking-[0.3em] opacity-60"
           style="color: var(--promo-text);">
          Limited Time Offer
        </p>

        <h2 class="mt-4 text-3xl sm:text-4xl lg:text-5xl font-extrabold"
            style="color: var(--promo-text);">
          {{ headline }}
        </h2>

        <p class="mt-4 text-sm sm:text-base opacity-75"
           style="color: var(--promo-text);">
          Join our exclusive circle and get special discounts on premium products.
        </p>

        <div class="mt-8 flex flex-col sm:flex-row gap-4">
          <a [routerLink]="link"
             class="inline-flex items-center justify-center rounded-full px-8 py-3 text-sm font-bold transition"
             style="background-color: var(--button-color); color: var(--button-text-color);">
            {{ cta }}
          </a>
          <button class="rounded-full border px-8 py-3 text-sm font-bold transition"
                  style="border-color: rgba(255,255,255,0.2); color: var(--promo-text);">
            Learn More
          </button>
        </div>
      </div>

      <!-- RIGHT -->
      <div class="text-center lg:text-right">
        <div class="text-6xl sm:text-7xl lg:text-8xl font-black"
             style="color: var(--promo-text);">
          15%
        </div>
        <div class="mt-2 text-xs font-bold tracking-[0.3em] uppercase opacity-60"
             style="color: var(--promo-text);">
          Discount Code: MONO15
        </div>
        <div class="mt-6 inline-flex items-center gap-2 rounded-full px-5 py-2 text-xs border"
             style="background-color: rgba(255,255,255,0.05); color: var(--promo-text); border-color: rgba(255,255,255,0.1);">
          <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
          Active Offer
        </div>
      </div>

    </div>
  </div>
</section>
