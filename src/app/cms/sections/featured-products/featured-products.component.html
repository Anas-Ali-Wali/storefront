<section class="bg-gradient-to-b from-slate-50 via-white to-slate-50 py-24">
  <div class="mx-auto max-w-7xl px-4 sm:px-6">

    <!-- Header -->
    <div class="flex flex-col md:flex-row md:items-end md:justify-between mb-14">

      <div>
        <p class="text-xs font-bold uppercase tracking-[0.35em] text-blue-600">
          Featured Collection
        </p>

        <h2 class="mt-3 text-4xl md:text-5xl font-extrabold text-slate-900">
          New Arrivals
        </h2>

        <p class="mt-3 text-slate-500 max-w-lg">
          Discover premium curated products designed for modern lifestyle and performance.
        </p>
      </div>

      <a routerLink="/shop"
         class="mt-6 md:mt-0 inline-flex items-center gap-2 text-sm font-bold text-slate-700 hover:text-blue-600 transition">
        View All →
      </a>

    </div>

    <!-- Grid -->
    <div class="grid gap-8 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">

      <!-- PRODUCT CARD (CLICKABLE) -->
      <a
        *ngFor="let product of products"
        [routerLink]="['/product', product.productId]"
        class="group relative bg-white rounded-3xl overflow-hidden border border-slate-100 shadow-sm hover:shadow-2xl transition-all duration-500 block">

        <!-- IMAGE -->
        <div class="relative aspect-[4/5] overflow-hidden">

          <img
            [src]="getImageUrl(product.imageUrl)"
            class="w-full h-full object-cover group-hover:scale-110 transition duration-700"
          />

          <!-- gradient -->
          <div class="absolute inset-0 bg-gradient-to-t from-black/50 via-black/10 to-transparent"></div>

          <!-- badge -->
          <div class="absolute top-4 left-4">
            <span class="bg-white/90 text-xs font-bold px-3 py-1 rounded-full shadow">
              New
            </span>
          </div>

          <!-- QUICK CART -->
          <button
            (click)="addToCart(product); $event.preventDefault(); $event.stopPropagation()"
            class="absolute bottom-4 right-4 w-11 h-11 rounded-full bg-white shadow-lg flex items-center justify-center
                   opacity-0 group-hover:opacity-100 group-hover:translate-y-0 translate-y-3 transition">
            🛒
          </button>

        </div>

        <!-- CONTENT -->
        <div class="p-5 space-y-2">

          <h3 class="font-bold text-slate-900 group-hover:text-blue-600 transition">
            {{ product.name }}
          </h3>

          <p class="text-xs text-slate-500 line-clamp-1">
            {{ product.description }}
          </p>

          <div class="flex items-center justify-between pt-2">
            <span class="text-lg font-extrabold text-blue-600">
              ${{ product.price }}
            </span>

            <span class="text-xs text-slate-400">
              Stock: {{ product.stockQty }}
            </span>
          </div>

        </div>

      </a>

    </div>
  </div>
</section>
