<section class="py-24" style="background-color: var(--bg-color);">
  <div class="mx-auto max-w-7xl px-4 sm:px-6">

    <!-- Header -->
    <div class="flex flex-col md:flex-row md:items-end md:justify-between mb-14">
      <div>
        <p class="text-xs font-bold uppercase tracking-[0.35em]"
           style="color: var(--primary-color);">
          Featured Collection
        </p>
        <h2 class="mt-3 text-4xl md:text-5xl font-extrabold"
            style="color: var(--text-color);">
          New Arrivals
        </h2>
        <p class="mt-3 max-w-lg opacity-60"
           style="color: var(--text-color);">
          Discover premium curated products designed for modern lifestyle.
        </p>
      </div>
      <a routerLink="/shop"
         class="mt-6 md:mt-0 inline-flex items-center gap-2 text-sm font-bold transition"
         style="color: var(--primary-color);">
        View All →
      </a>
    </div>

    <!-- Grid -->
    <div class="grid gap-8 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">

      <a *ngFor="let product of products"
         [routerLink]="['/product', product.productId]"
         class="group relative rounded-3xl overflow-hidden border shadow-sm hover:shadow-2xl transition-all duration-500 block"
         style="background-color: var(--card-bg); border-color: rgba(128,128,128,0.15);">

        <!-- IMAGE -->
        <div class="relative aspect-[4/5] overflow-hidden">
          <img [src]="getImageUrl(product.imageUrl)"
               class="w-full h-full object-cover group-hover:scale-110 transition duration-700"/>
          <div class="absolute inset-0 bg-gradient-to-t from-black/50 via-black/10 to-transparent"></div>
          <div class="absolute top-4 left-4">
            <span class="text-xs font-bold px-3 py-1 rounded-full shadow"
                  style="background-color: var(--card-bg); color: var(--primary-color);">
              New
            </span>
          </div>
          <button
            (click)="addToCart(product); $event.preventDefault(); $event.stopPropagation()"
            class="absolute bottom-4 right-4 w-11 h-11 rounded-full shadow-lg flex items-center justify-center opacity-0 group-hover:opacity-100 transition"
            style="background-color: var(--button-color); color: var(--button-text-color);">
            🛒
          </button>
        </div>

        <!-- CONTENT -->
        <div class="p-5 space-y-2">
          <h3 class="font-bold transition"
              style="color: var(--card-text);">
            {{ product.name }}
          </h3>
          <p class="text-xs line-clamp-1 opacity-60"
             style="color: var(--card-text);">
            {{ product.description }}
          </p>
          <div class="flex items-center justify-between pt-2">
            <span class="text-lg font-extrabold"
                  style="color: var(--primary-color);">
              PKR {{ product.price | number:'1.0-0' }}
            </span>
            <span class="text-xs opacity-50"
                  style="color: var(--card-text);">
              Stock: {{ product.stockQty }}
            </span>
          </div>
        </div>

      </a>
    </div>
  </div>
</section>
