<section class="mx-auto max-w-7xl space-y-6 px-4 py-8 sm:px-6 md:py-10">
  <div class="flex flex-col gap-3 md:flex-row md:items-end md:justify-between">
    <div>
      <p class="text-sm font-semibold uppercase tracking-[0.28em] text-blue-600">Featured</p>
      <h2 class="mt-2 text-3xl font-bold text-slate-900">Top picks for you</h2>
    </div>
    <a routerLink="/shop" class="inline-flex items-center text-sm font-semibold text-slate-700 transition hover:text-slate-900">
      View All
      <span class="ml-2 text-blue-600">→</span>
    </a>
  </div>
  <div class="grid gap-6 sm:grid-cols-2 xl:grid-cols-4">
    <app-product-card
      *ngFor="let product of products"
      [product]="product"
      (addToCart)="addToCart($event)"
    ></app-product-card>
  </div>
</section>
