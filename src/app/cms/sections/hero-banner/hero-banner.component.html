<section class="relative min-h-[90vh] flex items-center overflow-hidden">

  <!-- Background only (no image here) -->
  <div class="absolute inset-0 bg-[linear-gradient(120deg,#e6ebe9_0%,#c4d1cb_40%,#6f877e_100%)]"></div>

  <!-- Soft glow -->
  <div class="absolute inset-0 bg-[radial-gradient(circle_at_15%_25%,rgba(255,255,255,0.8),transparent_60%)]"></div>
  <div class="absolute -top-10 -left-10 w-72 h-72 bg-white/40 rounded-full blur-3xl"></div>
  <div class="absolute bottom-0 right-0 w-96 h-96 bg-black/10 rounded-full blur-3xl"></div>

  <!-- Content -->
  <div class="relative z-10 max-w-7xl mx-auto px-6 w-full">

    <div class="grid md:grid-cols-2 items-center gap-10 min-h-[90vh]">

      <!-- LEFT SIDE TEXT -->
      <div>

        <span class="inline-block px-4 py-1.5 mb-6 rounded-full bg-black/5 text-slate-700 text-xs font-bold uppercase tracking-widest border border-black/10">
          Limited Release
        </span>

        <h1 class="text-4xl md:text-6xl lg:text-7xl font-extrabold text-slate-900 leading-tight mb-6">
          The Art of <br>
          <span class="text-orange-600">Simplicity.</span>
        </h1>

        <p class="text-lg text-slate-600 mb-8 max-w-md leading-relaxed">
          A curated selection of functional minimalists designed to elevate your daily environment.
        </p>

        <a 
          href="#"
          class="inline-flex items-center gap-2 bg-orange-600 text-white px-8 py-3 rounded-full font-semibold shadow-md hover:bg-orange-500 transition"
        >
          Explore Collection →
        </a>

      </div>

      <!-- RIGHT SIDE IMAGE (below button style) -->
      <div class="flex justify-center md:justify-end mt-10 md:mt-0">

        <img 
          src="./assets/slides/backround-png.png"
          alt="Hero Image"
          class="w-[320px] md:w-[420px] lg:w-[500px] object-contain drop-shadow-2xl"
        >

      </div>

    </div>

  </div>

</section>
