



<div class="product-info">
  <div class="product-price-row">
    <p class="product-name">{{ product.name }}</p>
    <span class="product-price">{{ product.price | currency:'PKR ':'symbol':'1.0-0' }}</span>
  </div>
  <!-- baaki sab same rahega -->
   <div class="product-card">

  <div class="product-img-wrap">
    <img
      [src]="product.imageUrl || 'https://via.placeholder.com/300x300?text=Product'"
      [alt]="product.name"
      class="product-img"
    />
    <div class="product-overlay">
      <button class="overlay-btn wishlist-btn" title="Wishlist">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </button>
    </div>
    <span *ngIf="product.stockQty < 10 && product.stockQty > 0" class="stock-badge low-stock">Only {{ product.stockQty }} left</span>
    <span *ngIf="product.stockQty === 0" class="stock-badge out-of-stock">Out of Stock</span>
  </div>

  <div class="product-info">
    <p class="product-name">{{ product.name }}</p>

    <div class="product-rating">
      <span class="stars">★★★★☆</span>
      <span class="rating-count">(42)</span>
    </div>

    <div class="product-price-row">
      <span class="product-price">{{ product.price | currency:'PKR ':'symbol':'1.0-0' }}</span>
    </div>

    <div class="product-actions">
      <a [routerLink]="['/product', product.productId]" class="btn-view">View Details</a>
      <button class="btn-cart" (click)="onAddToCart()" [disabled]="product.stockQty === 0">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        Add
      </button>
    </div>
  </div>

</div>
</div>
