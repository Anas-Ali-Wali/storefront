<main class="pt-20 pb-16 max-w-[1920px] mx-auto px-4 sm:px-6 lg:px-10"
      style="background-color: var(--bg-color);">

  <section class="mb-10">
    <div class="flex flex-col gap-6 md:flex-row md:items-end md:justify-between">
      <div>
        <h1 class="text-3xl sm:text-4xl lg:text-5xl font-extrabold tracking-tight"
            style="color: var(--text-color);">The Collection</h1>
        <p class="mt-2 max-w-xl text-sm sm:text-base opacity-60"
           style="color: var(--text-color);">
          A curated selection of modern essentials for your lifestyle.
        </p>
      </div>
      <div class="flex items-center gap-3">
        <span class="text-sm hidden sm:block opacity-60"
              style="color: var(--text-color);">Sort</span>
        <select class="border rounded-xl px-3 py-2 text-sm shadow-sm"
                style="background-color: var(--card-bg);
                       color: var(--card-text);
                       border-color: rgba(128,128,128,0.2);">
          <option>Featured</option>
          <option>Price Low → High</option>
          <option>Price High → Low</option>
          <option>Newest</option>
        </select>
      </div>
    </div>
  </section>

  <div class="lg:hidden mb-4">
    <button (click)="showFilters = !showFilters"
            class="w-full py-3 rounded-xl font-semibold"
            style="background-color: var(--button-color); color: var(--button-text-color);">
      Filters
    </button>
  </div>

  <div class="flex flex-col lg:flex-row gap-6 lg:gap-10">

    <!-- FILTER SIDEBAR -->
    <aside class="w-full lg:w-72 rounded-2xl shadow-sm border p-5 lg:sticky lg:top-24 h-fit"
           style="background-color: var(--card-bg); border-color: rgba(128,128,128,0.15);"
           [class.hidden]="!showFilters && isMobile">
      <app-product-filters
        [categories]="categories"
        (categorySelected)="filterByCategory($event)">
      </app-product-filters>
    </aside>

    <section class="flex-1">
      <div class="grid gap-4 sm:gap-6 grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">

        <div *ngFor="let product of products"
             class="group rounded-2xl overflow-hidden shadow-sm hover:shadow-xl transition"
             style="background-color: var(--card-bg); border: 1px solid rgba(128,128,128,0.12);">

          <div class="relative aspect-[4/5] overflow-hidden cursor-pointer"
               [routerLink]="['/product', product.productId]">
            <img [src]="getImageUrl(product.imageUrl)"
                 class="w-full h-full object-cover group-hover:scale-110 transition duration-700"/>
            <div class="absolute inset-0 bg-gradient-to-t from-black/40 to-transparent"></div>
            <button (click)="addToCart(product); $event.stopPropagation()"
                    class="absolute bottom-3 right-3 w-10 h-10 rounded-full shadow
                           flex items-center justify-center opacity-0 group-hover:opacity-100 transition"
                    style="background-color: var(--button-color); color: var(--button-text-color);">
              🛒
            </button>
          </div>

          <!-- CONTENT -->
          <div class="p-3 sm:p-4">
            <h3 class="font-semibold text-sm sm:text-base"
                style="color: var(--card-text);">
              {{ product.name }}
            </h3>
            <p class="text-xs line-clamp-1 opacity-60"
               style="color: var(--card-text);">
              {{ product.description }}
            </p>
            <div class="flex justify-between mt-2 items-center">
              <span class="font-bold text-sm"
                    style="color: var(--primary-color);">
                PKR {{ product.price | number:'1.0-0' }}
              </span>
              <span class="text-xs opacity-50"
                    style="color: var(--card-text);">
                Stock: {{ product.stockQty }}
              </span>
            </div>
          </div>

        </div>
      </div>
    </section>

  </div>
</main>
