<div class="grid gap-8 lg:grid-cols-[280px_1fr]">
  <aside class="bg-white rounded-3xl p-6 shadow-sm">
    <h2 class="font-semibold text-lg mb-4">Filters</h2>
    <app-product-filters [categories]="categories" (categorySelected)="filterByCategory($event)"></app-product-filters>
  </aside>
  <section>
    <div class="mb-6">
      <h1 class="text-3xl font-bold">Shop Products</h1>
      <p class="text-slate-600 mt-2">Browse curated collections, categories, and top sellers.</p>
    </div>
    <div *ngIf="loading">
      <app-loader></app-loader>
    </div>
    <div class="grid gap-6 md:grid-cols-2 xl:grid-cols-3">
      <app-product-card *ngFor="let product of products" [product]="product" (addToCart)="addToCart($event)"></app-product-card>
    </div>
  </section>
</div>
