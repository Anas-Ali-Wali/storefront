<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-950 via-slate-900 to-blue-950 px-4 py-10">

  <div class="w-full max-w-md rounded-3xl bg-white/95 backdrop-blur-xl shadow-2xl border border-white/20 p-6 sm:p-8">

    <div class="text-center">
      <p class="text-xs uppercase tracking-[0.3em] text-blue-600 font-bold">
        Welcome back
      </p>

      <h1 class="mt-3 text-2xl sm:text-3xl font-extrabold text-slate-900">
        Sign in to your account
      </h1>

      <p class="mt-2 text-sm text-slate-500">
        Fast & secure access to your dashboard
      </p>
    </div>

    <form (ngSubmit)="submit()" class="mt-8 space-y-5">

      <div>
        <label class="text-sm font-semibold text-slate-700">Email</label>
        <input
          [(ngModel)]="email"
          name="email"
          type="email"
          required
          class="mt-2 w-full rounded-xl border border-slate-200 px-4 py-3 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition"
          placeholder="Enter your email"
        />
      </div>

      <div>
        <label class="text-sm font-semibold text-slate-700">Password</label>
        <input
          [(ngModel)]="password"
          name="password"
          type="password"
          required
          class="mt-2 w-full rounded-xl border border-slate-200 px-4 py-3 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition"
          placeholder="Enter your password"
        />
      </div>

      <div *ngIf="error"
           class="rounded-xl bg-red-50 border border-red-200 text-red-600 text-sm px-4 py-3">
        {{ error }}
      </div>

      <button
        type="submit"
        class="w-full rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 py-3 text-white font-semibold shadow-md hover:shadow-xl hover:scale-[1.01] active:scale-95 transition">

        Login

      </button>

    </form>

    <p class="mt-6 text-center text-xs text-slate-400">
      © 2026 Storefront. All rights reserved.
    </p>

  </div>

</div>
