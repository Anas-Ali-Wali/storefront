<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-950 via-slate-900 to-blue-950 px-4 py-10">

  <div class="w-full max-w-md rounded-3xl bg-white shadow-2xl p-8">

    <!-- Header -->
    <div class="text-center mb-8">
      <div class="w-14 h-14 bg-orange-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <span class="text-2xl">👤</span>
      </div>
      <h1 class="text-2xl font-extrabold text-slate-900">Welcome back</h1>
      <p class="mt-1 text-sm text-slate-500">Sign in to your account</p>
    </div>

    <!-- Form -->
    <form (ngSubmit)="submit()" class="space-y-4">

      <div>
        <label class="text-sm font-semibold text-slate-700">Email</label>
        <input
          [(ngModel)]="email"
          name="email"
          type="email"
          required
          placeholder="Enter your email"
          class="mt-1.5 w-full rounded-xl border border-slate-200 px-4 py-3 text-sm outline-none focus:border-orange-400 focus:ring-2 focus:ring-orange-100 transition"
        />
      </div>

      <div>
        <label class="text-sm font-semibold text-slate-700">Password</label>
        <input
          [(ngModel)]="password"
          name="password"
          type="password"
          required
          placeholder="Enter your password"
          class="mt-1.5 w-full rounded-xl border border-slate-200 px-4 py-3 text-sm outline-none focus:border-orange-400 focus:ring-2 focus:ring-orange-100 transition"
        />
      </div>

      <!-- Error -->
<div *ngIf="error"
     class="rounded-xl bg-red-50 border border-red-200 text-red-600 text-sm px-4 py-3">
  ⚠️ {{ error }}
  <!-- ✅ Register nahi hai to link dikhao -->
  <a *ngIf="error.includes('register')"
     routerLink="/auth/register"
     class="block mt-2 font-semibold text-orange-500 hover:underline">
    → Create Account
  </a>
</div>

      <!-- Submit -->
      <button
        type="submit"
        [disabled]="loading"
        class="w-full rounded-xl bg-orange-500 hover:bg-orange-600 py-3 text-white font-semibold shadow-md transition disabled:opacity-50 disabled:cursor-not-allowed">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>

    </form>

    <!-- Divider -->
    <div class="flex items-center gap-3 my-5">
      <div class="flex-1 h-px bg-slate-200"></div>
      <span class="text-xs text-slate-400">OR</span>
      <div class="flex-1 h-px bg-slate-200"></div>
    </div>

    <!-- Register link -->
    <p class="text-center text-sm text-slate-500">
      Don't have an account?
      <a routerLink="/auth/register"
         class="text-orange-500 font-semibold hover:underline ml-1">
        Create Account
      </a>
    </p>

  </div>

</div>
