<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-950 via-slate-900 to-blue-950 px-4 py-10">

  <div class="w-full max-w-md rounded-3xl bg-white shadow-2xl p-8">

    <!-- Header -->
    <div class="text-center mb-8">
      <div class="w-14 h-14 bg-orange-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <span class="text-2xl">✨</span>
      </div>
      <h1 class="text-2xl font-extrabold text-slate-900">Create Account</h1>
      <p class="mt-1 text-sm text-slate-500">Join us and start shopping</p>
    </div>

    <!-- Form -->
    <form #form="ngForm" (ngSubmit)="submit(form)" class="space-y-4">

      <!-- First Name + Last Name -->
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-sm font-semibold text-slate-700">First Name</label>
          <input
            [(ngModel)]="firstName"
            name="firstName"
            required
            minlength="2"
            #firstNameRef="ngModel"
            placeholder="First name"
            class="mt-1.5 w-full rounded-xl border px-4 py-3 text-sm outline-none transition"
            [ngClass]="firstNameRef.invalid && firstNameRef.touched ? 
              'border-red-400 bg-red-50' : 
              'border-slate-200 focus:border-orange-400 focus:ring-2 focus:ring-orange-100'"
          />
          <p *ngIf="firstNameRef.touched && firstNameRef.invalid"
             class="text-xs text-red-500 mt-1">Min 2 characters</p>
        </div>

        <div>
          <label class="text-sm font-semibold text-slate-700">Last Name</label>
          <input
            [(ngModel)]="lastName"
            name="lastName"
            required
            minlength="2"
            #lastNameRef="ngModel"
            placeholder="Last name"
            class="mt-1.5 w-full rounded-xl border px-4 py-3 text-sm outline-none transition"
            [ngClass]="lastNameRef.invalid && lastNameRef.touched ? 
              'border-red-400 bg-red-50' : 
              'border-slate-200 focus:border-orange-400 focus:ring-2 focus:ring-orange-100'"
          />
          <p *ngIf="lastNameRef.touched && lastNameRef.invalid"
             class="text-xs text-red-500 mt-1">Min 2 characters</p>
        </div>
      </div>

      <!-- Email -->
      <div>
        <label class="text-sm font-semibold text-slate-700">Email</label>
        <input
          [(ngModel)]="email"
          name="email"
          type="email"
          required
          email
          #emailRef="ngModel"
          placeholder="Enter your email"
          class="mt-1.5 w-full rounded-xl border px-4 py-3 text-sm outline-none transition"
          [ngClass]="emailRef.invalid && emailRef.touched ? 
            'border-red-400 bg-red-50' : 
            'border-slate-200 focus:border-orange-400 focus:ring-2 focus:ring-orange-100'"
        />
        <p *ngIf="emailRef.touched && emailRef.invalid"
           class="text-xs text-red-500 mt-1">Enter a valid email</p>
      </div>

      <!-- Password -->
      <div>
        <label class="text-sm font-semibold text-slate-700">Password</label>
        <input
          [(ngModel)]="password"
          name="password"
          type="password"
          required
          minlength="6"
          #passwordRef="ngModel"
          placeholder="Create a password"
          class="mt-1.5 w-full rounded-xl border px-4 py-3 text-sm outline-none transition"
          [ngClass]="passwordRef.invalid && passwordRef.touched ? 
            'border-red-400 bg-red-50' : 
            'border-slate-200 focus:border-orange-400 focus:ring-2 focus:ring-orange-100'"
        />
        <p *ngIf="passwordRef.touched && passwordRef.invalid"
           class="text-xs text-red-500 mt-1">Min 6 characters</p>
      </div>

      <!-- Error -->
      <div *ngIf="error"
           class="rounded-xl bg-red-50 border border-red-200 text-red-600 text-sm px-4 py-3">
        ⚠️ {{ error }}
      </div>

      <!-- Submit -->
      <button
        type="submit"
        [disabled]="form.invalid || loading"
        class="w-full rounded-xl bg-orange-500 hover:bg-orange-600 py-3 text-white 
               font-semibold shadow-md transition disabled:opacity-50 disabled:cursor-not-allowed">
        {{ loading ? 'Creating Account...' : 'Create Account' }}
      </button>

    </form>

    <!-- Divider -->
    <div class="flex items-center gap-3 my-5">
      <div class="flex-1 h-px bg-slate-200"></div>
      <span class="text-xs text-slate-400">OR</span>
      <div class="flex-1 h-px bg-slate-200"></div>
    </div>

    <!-- Login link -->
    <p class="text-center text-sm text-slate-500">
      Already have an account?
      <a routerLink="/auth/login"
         class="text-orange-500 font-semibold hover:underline ml-1">
        Sign In
      </a>
    </p>

  </div>

</div>
